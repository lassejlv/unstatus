services:
  caddy-proxy:
    build:
      context: ../..
      dockerfile: packages/caddy/Dockerfile
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - UPSTREAM_URL=${UPSTREAM_URL}
      - API_PORT=${API_PORT:-3456}
      - ASK_SECRET=${ASK_SECRET:-}
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
